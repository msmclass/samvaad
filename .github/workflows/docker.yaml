name: Release to Docker

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
  # Tags pushed by GITHUB_TOKEN do not trigger other workflows (GitHub security
  # restriction), so we chain off the Test workflow via workflow_run instead.
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]
  push:
    tags:
      - 'v*' # direct tag push (e.g. manual) still works

jobs:
  build-server:
    name: Build & Publish Samvaad Server
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # fetch full history so tags are available

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Download Go modules
        run: go mod download

      - name: Install stringer
        run: go install golang.org/x/tools/cmd/stringer@latest

      - name: Generate code
        uses: magefile/mage-action@v4
        with:
          version: latest
          args: generate

      - name: Resolve tag to publish
        id: resolve_tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_NAME="${{ github.ref_name }}"
          else
            git fetch --tags --force
            TAG_NAME=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          fi

          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT

          if [[ "${TAG_NAME}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)\.([0-9]+)$ ]]; then
            BASE_VERSION="${BASH_REMATCH[1]}"
            FULL_VERSION="${BASE_VERSION}.${BASH_REMATCH[2]}"
          else
            CLEAN="${TAG_NAME#v}"
            BASE_VERSION="${CLEAN}"
            FULL_VERSION="${CLEAN}"
          fi
          echo "base_version=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "full_version=${FULL_VERSION}" >> $GITHUB_OUTPUT
          echo "Resolved tag: ${TAG_NAME} → base=${BASE_VERSION} full=${FULL_VERSION}"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/msmclass/samvaad-server
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.resolve_tag.outputs.full_version }}
            type=raw,value=${{ steps.resolve_tag.outputs.base_version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Samvaad Server
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-app:
    name: Build & Publish Samvaad Dashboard App
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # fetch full history so tags are available

      - name: Resolve tag to publish
        id: resolve_tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_NAME="${{ github.ref_name }}"
          else
            git fetch --tags --force
            TAG_NAME=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          fi

          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT

          if [[ "${TAG_NAME}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)\.([0-9]+)$ ]]; then
            BASE_VERSION="${BASH_REMATCH[1]}"
            FULL_VERSION="${BASE_VERSION}.${BASH_REMATCH[2]}"
          else
            CLEAN="${TAG_NAME#v}"
            BASE_VERSION="${CLEAN}"
            FULL_VERSION="${CLEAN}"
          fi
          echo "base_version=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "full_version=${FULL_VERSION}" >> $GITHUB_OUTPUT
          echo "Resolved tag: ${TAG_NAME} → base=${BASE_VERSION} full=${FULL_VERSION}"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/msmclass/samvaad
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.resolve_tag.outputs.full_version }}
            type=raw,value=${{ steps.resolve_tag.outputs.base_version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Samvaad Dashboard App
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: ./samvaad
          file: ./samvaad/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
