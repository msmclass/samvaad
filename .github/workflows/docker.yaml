name: Release to Docker

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
  # Tags pushed by GITHUB_TOKEN do not trigger other workflows (GitHub security
  # restriction), so we chain off the Test workflow via workflow_run instead.
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]
  push:
    tags:
      - 'v*' # direct tag push (e.g. manual) still works

jobs:
  build-docker:
    name: Build ${{ matrix.image }} (${{ matrix.arch }})
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    strategy:
      fail-fast: false
      matrix:
        image: [server, app]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # fetch full history so tags are available

      - name: Set up Go
        if: matrix.image == 'server'
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Download Go modules
        if: matrix.image == 'server'
        run: go mod download

      - name: Install stringer
        if: matrix.image == 'server'
        run: go install golang.org/x/tools/cmd/stringer@latest

      - name: Generate code
        if: matrix.image == 'server'
        uses: magefile/mage-action@v4
        with:
          version: latest
          args: generate

      - name: Resolve tag to publish
        id: resolve_tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_NAME="${{ github.ref_name }}"
          else
            git fetch --tags --force
            TAG_NAME=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          fi

          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT

          if [[ "${TAG_NAME}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)\.([0-9]+)$ ]]; then
            BASE_VERSION="${BASH_REMATCH[1]}"
            FULL_VERSION="${BASE_VERSION}.${BASH_REMATCH[2]}"
          else
            CLEAN="${TAG_NAME#v}"
            BASE_VERSION="${CLEAN}"
            FULL_VERSION="${CLEAN}"
          fi
          echo "base_version=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "full_version=${FULL_VERSION}" >> $GITHUB_OUTPUT
          echo "Resolved tag: ${TAG_NAME} → base=${BASE_VERSION} full=${FULL_VERSION}"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/msmclass/samvaad
          tags: |
            type=raw,value=${{ matrix.image == 'server' && '' || 'app-' }}latest-${{ matrix.arch }}
            type=raw,value=${{ matrix.image == 'server' && '' || 'app-' }}${{ steps.resolve_tag.outputs.full_version }}-${{ matrix.arch }}
            type=raw,value=${{ matrix.image == 'server' && '' || 'app-' }}${{ steps.resolve_tag.outputs.base_version }}-${{ matrix.arch }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Architecture-Specific Image
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image == 'server' && '.' || './samvaad' }}
          file: ${{ matrix.image == 'server' && './Dockerfile' || './samvaad/Dockerfile' }}
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/${{ matrix.arch }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  merge-manifests:
    name: Merge Multi-Arch Docker Manifests
    needs: build-docker
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        image: [server, app]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag to publish
        id: resolve_tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_NAME="${{ github.ref_name }}"
          else
            git fetch --tags --force
            TAG_NAME=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          fi

          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT

          if [[ "${TAG_NAME}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)\.([0-9]+)$ ]]; then
            BASE_VERSION="${BASH_REMATCH[1]}"
            FULL_VERSION="${BASE_VERSION}.${BASH_REMATCH[2]}"
          else
            CLEAN="${TAG_NAME#v}"
            BASE_VERSION="${CLEAN}"
            FULL_VERSION="${CLEAN}"
          fi
          echo "base_version=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "full_version=${FULL_VERSION}" >> $GITHUB_OUTPUT
          echo "Resolved tag: ${TAG_NAME} → base=${BASE_VERSION} full=${FULL_VERSION}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and Push Multi-Arch Manifests
        run: |
          IMAGE_NAME="ghcr.io/msmclass/samvaad"

          if [[ "${{ matrix.image }}" == "server" ]]; then
            TAG_PREFIX=""
          else
            TAG_PREFIX="app-"
          fi

          TAGS=("latest" "${{ steps.resolve_tag.outputs.full_version }}" "${{ steps.resolve_tag.outputs.base_version }}")

          echo "Waiting 15 seconds for registry indexing propagation..."
          sleep 15

          for tag in "${TAGS[@]}"; do
            target_tag="${TAG_PREFIX}${tag}"
            echo "Creating multi-arch manifest for ${IMAGE_NAME}:${target_tag}..."

            # imagetools create works correctly even when the source tags
            # are manifest lists (as produced by build-push-action@v6).
            # It combines them into a new multi-arch OCI index.
            docker buildx imagetools create \
              --tag "${IMAGE_NAME}:${target_tag}" \
              "${IMAGE_NAME}:${target_tag}-amd64" \
              "${IMAGE_NAME}:${target_tag}-arm64"
          done
