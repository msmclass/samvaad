name: Release to Docker

permissions:
  contents: read
  packages: write

# Controls when the action will run.
on:
  workflow_dispatch:
  # Tags pushed by GITHUB_TOKEN do not trigger other workflows (GitHub security
  # restriction), so we chain off the Test workflow via workflow_run instead.
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]
  push:
    tags:
      - 'v*' # direct tag push (e.g. manual) still works

jobs:
  docker:
    runs-on: ubuntu-latest
    # Only run on success when triggered by workflow_run; always run for tag push or manual dispatch.
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # fetch full history so tags are available

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: "go.mod"

      - name: Download Go modules
        run: go mod download

      - name: Generate code
        uses: magefile/mage-action@a662bd8c29d8106879588cfff83b2faf6e6f59db # v4
        with:
          version: latest
          args: generate

      - name: Resolve tag to publish
        id: resolve_tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Direct tag push: use the pushed tag
            TAG_NAME="${{ github.ref_name }}"
          else
            # workflow_run or workflow_dispatch: pick the latest semver tag on HEAD's history
            git fetch --tags --force
            TAG_NAME=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          fi

          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT

          # Parse into base (x.y.z) and full (x.y.z.seq) versions
          if [[ "${TAG_NAME}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)\.([0-9]+)$ ]]; then
            BASE_VERSION="${BASH_REMATCH[1]}"
            FULL_VERSION="${BASE_VERSION}.${BASH_REMATCH[2]}"
          else
            CLEAN="${TAG_NAME#v}"
            BASE_VERSION="${CLEAN}"
            FULL_VERSION="${CLEAN}"
          fi
          echo "base_version=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "full_version=${FULL_VERSION}" >> $GITHUB_OUTPUT
          echo "Resolved tag: ${TAG_NAME} → base=${BASE_VERSION} full=${FULL_VERSION}"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: |
            ghcr.io/msmclass/samvaad-server
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.resolve_tag.outputs.full_version }}
            type=raw,value=${{ steps.resolve_tag.outputs.base_version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
