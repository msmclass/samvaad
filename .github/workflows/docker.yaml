name: Release to Docker

permissions:
  contents: read
  packages: write

# Controls when the action will run.
on:
  workflow_dispatch:
  push:
    # branches:
    #   - main # publish to 'main' tag
    tags:
      - 'v*' # publish on version tags, updates 'latest' tag
jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: "go.mod"

      - name: Download Go modules
        run: go mod download

      - name: Generate code
        uses: magefile/mage-action@a662bd8c29d8106879588cfff83b2faf6e6f59db # v4
        with:
          version: latest
          args: generate

      - name: Parse Tag Version
        id: parse_tag
        run: |
          REF_NAME="${{ github.ref_name }}"
          if [[ "$REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)\.([0-9]+)$ ]]; then
            BASE_VERSION="${BASH_REMATCH[1]}"
            SEQUENCE="${BASH_REMATCH[2]}"
            FULL_VERSION="${BASE_VERSION}.${SEQUENCE}"
            echo "base_version=${BASE_VERSION}" >> $GITHUB_OUTPUT
            echo "full_version=${FULL_VERSION}" >> $GITHUB_OUTPUT
          else
            # Fallback for standard tags or main branch
            CLEAN_VERSION="${REF_NAME#v}"
            echo "base_version=${CLEAN_VERSION}" >> $GITHUB_OUTPUT
            echo "full_version=${CLEAN_VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          # list of Docker images to use as base name for tags
          images: |
            ghcr.io/msmclass/samvaad-server
          # generate Docker tags based on the following events/attributes
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.parse_tag.outputs.full_version }},enable=${{ github.ref_type == 'tag' }}
            type=raw,value=${{ steps.parse_tag.outputs.base_version }},enable=${{ github.ref_type == 'tag' }}
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}


